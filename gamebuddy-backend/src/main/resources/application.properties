# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# SDD'de belirtildiği gibi MySQL kullanılacaktır. Veritabanı adı gamebuddy_db olarak ayarlanmıştır.
spring.datasource.url=jdbc:mysql://localhost:3306/gamebuddy_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=springstudent
spring.datasource.password=springstudent

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
# Uygulama çalıştığında tabloları drop edip yeniden oluşturur (Veritabanını temizler)
spring.jpa.hibernate.ddl-auto=update
# Konsolda SQL sorgularını ve formatlı halini görmek için
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Veritabanı başlatma scriptlerini devre dışı bırak (data.sql boş olduğu için hata veriyor)
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# ===============================
# JWT CONFIGURATION
# ===============================
# Gizli anahtar (Base64 formatında kodlanmış olmalıdır, en az 256 bit - 32 karakter)
jwt.secret=R2FtZUJ1ZGR5U2VjcmV0S2V5Rm9ySnd0QXV0aGVudGljYXRpb25NdXN0QmVWZXJ5U2VjdXJlIQ==
# 24 saat (milisaniye cinsinden: 24 * 60 * 60 * 1000 = 86400000)
jwt.expiration=86400000
